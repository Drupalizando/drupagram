name: Drupagram
type: theme
'base theme': stable9
version: 1.0.0
libraries:
  - drupagram/base
  - drupagram/messages
  - core/normalize
libraries-extend:
  user/drupal.user:
    - drupagram/user
  core/drupal.dropbutton:
    - drupagram/dropbutton
  core/drupal.dialog:
    - drupagram/dialog
  file/drupal.file:
